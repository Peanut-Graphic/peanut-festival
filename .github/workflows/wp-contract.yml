# Peanut — WordPress REST contract tests (net 7) on a REAL WordPress.
# Boots a real WP against a MySQL service and runs the real-WP contract suite
# (tests/ContractWp via phpunit.contract-wp.xml) — separate from the mock-based
# unit suites under tests/php so it can never silently fall back to mocks.
#
# Prereqs in the plugin (see .peanut/wp-harness / docs wp-harness/README.md):
#   - wp-phpunit/wp-phpunit + yoast/phpunit-polyfills in require-dev
#   - tests/ContractWp/bootstrap.php defines PLUGIN_MAIN_FILE then requires the shared bootstrap-wp.php
#   - phpunit.contract-wp.xml points at tests/ContractWp with that bootstrap
name: wp-contract

on:
  push: { branches: [ main ] }
  pull_request:

jobs:
  wp-contract:
    runs-on: [self-hosted, linux, peanut-ci]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports: [ "3306:3306" ]
        options: >-
          --health-cmd="mysqladmin ping -proot" --health-interval=5s
          --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"   # matches the repo's other CI (8.2/8.3); WP test lib + phpunit 9.6 run here
          extensions: mysqli
          tools: composer
      - run: composer install --no-interaction --prefer-dist

      - name: Fetch shared WP test installer
        run: |
          curl -fsSL -o /tmp/install-wp-tests.sh \
            "https://raw.githubusercontent.com/Peanut-Graphic/peanut-documentation/main/testing-standard/wp-harness/install-wp-tests.sh" \
          || cp .peanut/wp-harness/install-wp-tests.sh /tmp/install-wp-tests.sh   # vendored fallback (private repo)
          chmod +x /tmp/install-wp-tests.sh

      - name: Install WordPress test suite
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
        run: /tmp/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest

      - name: REST contract tests (net 7, real WordPress)
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
        run: vendor/bin/phpunit -c phpunit.contract-wp.xml
